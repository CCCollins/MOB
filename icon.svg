<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1A2E42"/>
    </linearGradient>
    <linearGradient id="eye-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0088BB"/>
    </linearGradient>
    <linearGradient id="chest-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A4F"/>
      <stop offset="100%" stop-color="#0D2233"/>
    </linearGradient>
    <filter id="glow-fx" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg-grad)"/>

  <!-- Corner hex marks -->
  <rect x="6" y="6" width="8" height="2" rx="1" fill="#1E4D66" opacity="0.8"/>
  <rect x="6" y="6" width="2" height="8" rx="1" fill="#1E4D66" opacity="0.8"/>
  <rect x="114" y="6" width="8" height="2" rx="1" fill="#1E4D66" opacity="0.8"/>
  <rect x="120" y="6" width="2" height="8" rx="1" fill="#1E4D66" opacity="0.8"/>
  <rect x="6" y="120" width="8" height="2" rx="1" fill="#1E4D66" opacity="0.8"/>
  <rect x="6" y="114" width="2" height="8" rx="1" fill="#1E4D66" opacity="0.8"/>
  <rect x="114" y="120" width="8" height="2" rx="1" fill="#1E4D66" opacity="0.8"/>
  <rect x="120" y="114" width="2" height="8" rx="1" fill="#1E4D66" opacity="0.8"/>

  <!-- Antenna -->
  <rect x="62" y="12" width="4" height="10" rx="2" fill="#2A6080"/>
  <circle cx="64" cy="10" r="3" fill="none" stroke="#00E5FF" stroke-width="1.2" opacity="0.7"/>
  <circle cx="64" cy="10" r="1.2" fill="#00E5FF" opacity="0.9" filter="url(#glow-fx)"/>

  <!-- Head -->
  <rect x="34" y="22" width="60" height="44" rx="10" fill="#162A3B" stroke="#1E4D66" stroke-width="1"/>

  <!-- Visor (dark strip) -->
  <rect x="38" y="30" width="52" height="16" rx="5" fill="#0A1E2E" stroke="#1A3A4E" stroke-width="0.8"/>

  <!-- Eyes -->
  <rect x="44" y="33" width="18" height="10" rx="3" fill="url(#eye-glow)" filter="url(#glow-fx)"/>
  <rect x="66" y="33" width="18" height="10" rx="3" fill="url(#eye-glow)" filter="url(#glow-fx)"/>
  <!-- Pupil lines -->
  <rect x="51" y="36" width="4" height="4" rx="1" fill="#003A55"/>
  <rect x="73" y="36" width="4" height="4" rx="1" fill="#003A55"/>

  <!-- Mouth / speaker grille -->
  <rect x="48" y="54" width="32" height="6" rx="3" fill="#0A1E2E" stroke="#1A3A4E" stroke-width="0.8"/>
  <rect x="52" y="56" width="4" height="2" rx="1" fill="#00E5FF" opacity="0.5"/>
  <rect x="59" y="56" width="4" height="2" rx="1" fill="#00E5FF" opacity="0.5"/>
  <rect x="66" y="56" width="4" height="2" rx="1" fill="#00E5FF" opacity="0.5"/>
  <rect x="73" y="56" width="4" height="2" rx="1" fill="#00E5FF" opacity="0.5"/>

  <!-- Neck -->
  <rect x="56" y="66" width="16" height="8" rx="3" fill="#1A2E42" stroke="#1E4D66" stroke-width="0.8"/>

  <!-- Shoulders -->
  <rect x="16" y="72" width="22" height="30" rx="8" fill="#162A3B" stroke="#1E4D66" stroke-width="1"/>
  <rect x="90" y="72" width="22" height="30" rx="8" fill="#162A3B" stroke="#1E4D66" stroke-width="1"/>
  <!-- Shoulder marks -->
  <rect x="21" y="80" width="12" height="2" rx="1" fill="#00E5FF" opacity="0.4"/>
  <rect x="21" y="84" width="8" height="2" rx="1" fill="#00E5FF" opacity="0.25"/>
  <rect x="95" y="80" width="12" height="2" rx="1" fill="#00E5FF" opacity="0.4"/>
  <rect x="95" y="84" width="8" height="2" rx="1" fill="#00E5FF" opacity="0.25"/>

  <!-- Torso -->
  <rect x="36" y="74" width="56" height="44" rx="8" fill="url(#chest-panel)" stroke="#1E4D66" stroke-width="1"/>

  <!-- Chest panel lines -->
  <rect x="42" y="82" width="44" height="1.5" rx="1" fill="#1E4D66" opacity="0.8"/>
  <rect x="42" y="86" width="44" height="1.5" rx="1" fill="#1E4D66" opacity="0.6"/>

  <!-- Center emblem: hexagon + AI core -->
  <polygon points="64,90 70,93.5 70,100.5 64,104 58,100.5 58,93.5" fill="none" stroke="#00E5FF" stroke-width="1.2" opacity="0.7"/>
  <circle cx="64" cy="97" r="4" fill="#00E5FF" opacity="0.15" filter="url(#glow-fx)"/>
  <circle cx="64" cy="97" r="2" fill="#00E5FF" opacity="0.8" filter="url(#glow-fx)"/>

  <!-- Status dot top right -->
  <circle cx="112" cy="16" r="3" fill="#00E5FF" opacity="0.6" filter="url(#glow-fx)"/>

  <!-- Bottom bar -->
  <rect x="36" y="118" width="22" height="3" rx="1.5" fill="#1E4D66" opacity="0.8"/>
  <rect x="70" y="118" width="22" height="3" rx="1.5" fill="#1E4D66" opacity="0.8"/>

  <!-- Signal arcs around head (left) -->
  <path d="M28,38 Q22,44 28,50" fill="none" stroke="#00E5FF" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M24,35 Q15,44 24,53" fill="none" stroke="#00E5FF" stroke-width="0.7" stroke-linecap="round" opacity="0.3"/>
  <!-- Signal arcs around head (right) -->
  <path d="M100,38 Q106,44 100,50" fill="none" stroke="#00E5FF" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M104,35 Q113,44 104,53" fill="none" stroke="#00E5FF" stroke-width="0.7" stroke-linecap="round" opacity="0.3"/>
</svg>